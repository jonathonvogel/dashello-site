<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#0584EC;--blue-dark:#0468BE;--navy:#0F172A;--off:#F4F8FF}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#fff;color:#1a1a2e;overflow-x:hidden}

/* ---- NAV ---- */
nav{background:#fff;padding:0 5%;height:112px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e7eb}
.nav-logo-wrap{display:flex;flex-direction:column;gap:2px}
.nav-logo-wrap img{height:96px;width:auto}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-link{font-size:13px;color:#555;text-decoration:none;font-weight:600;transition:color 0.15s}
.nav-link:hover{color:var(--blue)}
.nav-cta{background:var(--blue);color:#fff;font-weight:700;font-size:14px;padding:10px 22px;border-radius:8px;text-decoration:none;transition:transform 0.15s}
.nav-cta:hover{transform:scale(1.03)}
.beta-badge{display:block;width:fit-content;background:#0584EC;color:#fff;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:999px;margin:4px auto 0}
.nav-hamburger{display:none;background:none;border:none;color:#1a1a2e;font-size:24px;cursor:pointer;padding:4px;line-height:1}
.mobile-menu{display:none;position:fixed;top:112px;left:0;right:0;background:#fff;padding:20px;z-index:99;flex-direction:column;gap:0;border-bottom:1px solid #e5e7eb}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:15px;color:#1a1a2e;text-decoration:none;font-weight:600;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06)}
.mobile-menu a:last-child{border-bottom:none}

/* ---- FORM SECTION ---- */
.form-section{padding:80px 5%}
.form-inner{max-width:800px;margin:0 auto}
.form-inner iframe{display:block}

/* ---- FOOTER ---- */
footer{background:#000;padding:48px 5%}
.footer-inner{max-width:1080px;margin:0 auto;display:grid;grid-template-columns:1fr auto auto;gap:40px;align-items:start}
.footer-logo-wrap img{height:32px;width:auto;display:block;margin-bottom:6px}
.footer-tagline{color:#fff;font-size:10.5px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-top:3px;line-height:1;padding-left:1px;margin-bottom:8px}
.footer-copy{font-size:12px;color:#555;margin-top:4px}
.footer-links h4{font-size:14px;font-weight:700;color:#fff;margin-bottom:16px}
.footer-links ul{list-style:none;display:flex;flex-direction:column;gap:10px}
.footer-links li a{font-size:13px;color:#aaa;text-decoration:none;transition:color 0.15s;font-weight:600}
.footer-links li a:hover{color:#fff}

@media(max-width:768px){
  nav{padding:0 20px}
  .nav-right{display:none}
  .nav-hamburger{display:block}
  .form-section{padding:40px 20px}
  .footer-inner{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" style="text-decoration:none">
    <div class="nav-logo-wrap">
      <img src="images/2023/08/4.png" alt="Dashello" style="height:96px;width:auto;display:block">
      <span class="beta-badge">BETA</span>
    </div>

  <div class="nav-right">
    <a href="pricing/index.html" class="nav-link">Pricing</a>
    <a href="https://app.dashello.co" class="nav-link">Log in</a>
    <a href="pricing/index.html" class="nav-cta">Try For Free</a>
  </div>
  <button class="nav-hamburger" onclick="document.getElementById('mobileMenu').classList.toggle('open')" aria-label="Menu">
    <i class="ti ti-menu-2"></i>
  </button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="pricing/index.html">Pricing</a>

    <script>var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>
  </div>

<footer>

    <div>
      <a href="index.html" style="text-decoration:none">
        <div class="footer-logo-wrap">
          <img src="images/2023/08/White-Logo-Full.png" alt="Dashello">

          <span class="beta-badge">BETA</span>
        </div>

    </div>
    <div class="footer-links">
      <h4>Company</h4>
      <ul>
        <li><a href="about.html">About</a></li>
        <li><a href="blog/index.html">Blog</a></li>
